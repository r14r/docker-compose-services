postgresql:
  build: .
  container_name: postgresql
  restart: unless-stopped
  ports:
    - "5432:5432"
  environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=CHANGEME
    - POSTGRES_DB=app
  volumes:
    - postgresql_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 10s
    timeout: 5s
    retries: 5
