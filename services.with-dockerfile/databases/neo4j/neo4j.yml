neo4j:
  build: .
  container_name: neo4j
  restart: unless-stopped
  ports:
    - "7474:7474"
    - "7687:7687"
  environment:
    - NEO4J_AUTH=neo4j/CHANGEME
    - NEO4J_PLUGINS=["apoc"]
  volumes:
    - neo4j_data:/data
    - neo4j_logs:/logs
  healthcheck:
    test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
