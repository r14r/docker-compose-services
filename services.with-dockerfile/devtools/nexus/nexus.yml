nexus:
  build: .
  container_name: nexus
  restart: unless-stopped
  ports:
    - "8081:8081"
    - "5000:5000"
  environment:
    - INSTALL4J_ADD_VM_PARAMS=-Xms512m -Xmx2g -XX:MaxDirectMemorySize=3g
  volumes:
    - nexus_data:/nexus-data
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
    interval: 30s
    timeout: 10s
    retries: 5
