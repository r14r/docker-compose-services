vault:
  build: .
  container_name: vault
  restart: unless-stopped
  ports:
    - "8200:8200"
  # WARNING: dev mode only — do not use in production
  environment:
    - VAULT_DEV_ROOT_TOKEN_ID=CHANGEME
    - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
  cap_add:
    - IPC_LOCK
  volumes:
    - vault_data:/vault/data
    - vault_logs:/vault/logs
