mariadb:
  build: .
  container_name: mariadb
  restart: unless-stopped
  ports:
    - "3306:3306"
  environment:
    - MARIADB_ROOT_PASSWORD=CHANGEME
    - MARIADB_DATABASE=app
    - MARIADB_USER=app
    - MARIADB_PASSWORD=CHANGEME
  volumes:
    - mariadb_data:/var/lib/mysql
  healthcheck:
    test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    interval: 10s
    timeout: 5s
    retries: 5
