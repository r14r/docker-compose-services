loki:
  image: grafana/loki:latest
  container_name: loki
  restart: unless-stopped
  ports:
    - "3100:3100"
  command: -config.file=/etc/loki/local-config.yaml
  volumes:
    - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    - loki_data:/loki
  healthcheck:
    test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:3100/ready || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 5
