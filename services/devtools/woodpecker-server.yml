woodpecker-server:
  image: woodpeckerci/woodpecker-server:latest
  container_name: woodpecker-server
  restart: unless-stopped
  ports:
    - "8000:8000"
    - "9000:9000"
  environment:
    - WOODPECKER_OPEN=true
    - WOODPECKER_HOST=http://localhost:8000
    - WOODPECKER_GITEA=true
    - WOODPECKER_GITEA_URL=http://gitea:3000
    - WOODPECKER_GITEA_CLIENT=CHANGEME
    - WOODPECKER_GITEA_SECRET=CHANGEME
    - WOODPECKER_AGENT_SECRET=CHANGEME
    - WOODPECKER_DATABASE_DRIVER=postgres
    - WOODPECKER_DATABASE_DATASOURCE=postgres://woodpecker:CHANGEME@postgresql/woodpecker?sslmode=disable
  volumes:
    - woodpecker_data:/var/lib/woodpecker
  depends_on:
    - gitea
    - postgresql
