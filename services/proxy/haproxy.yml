haproxy:
  image: haproxy:2-alpine
  container_name: haproxy
  restart: unless-stopped
  ports:
    - "80:80"
    - "443:443"
    - "8404:8404"
  volumes:
    - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
  healthcheck:
    test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
    interval: 15s
    timeout: 5s
    retries: 3
